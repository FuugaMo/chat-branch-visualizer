<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Branch Visualizer</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header id="cbv-header">
    <div class="cbv-logo">
      <!-- Branch tree icon -->
      <svg class="cbv-logo-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10" cy="3.5"  r="2" fill="currentColor" opacity=".9"/>
        <circle cx="4"  cy="16.5" r="2" fill="currentColor" opacity=".75"/>
        <circle cx="16" cy="16.5" r="2" fill="currentColor" opacity=".75"/>
        <circle cx="10" cy="10"   r="1.5" fill="currentColor" opacity=".55"/>
        <path d="M10 5.5V8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M10 11.5V13.5Q10 14.5 4 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 11.5V13.5Q10 14.5 16 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="cbv-title">Branch Visualizer</span>
    </div>

    <div class="cbv-actions">
      <!-- Build -->
      <button id="btn-build" class="cbv-btn" title="Auto-traverse all branches to build full tree">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <path d="M8 1L10.5 6H13.5L11 9.5L12 14L8 11.5L4 14L5 9.5L2.5 6H5.5L8 1Z"
                fill="currentColor" opacity=".9"/>
        </svg>
        Build
      </button>

      <!-- Cancel (shown only while building) -->
      <button id="btn-cancel" class="cbv-btn cbv-btn-danger" title="Cancel build" hidden>
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        Cancel
      </button>

      <div class="cbv-btn-divider"></div>

      <!-- Refresh -->
      <button id="btn-refresh" class="cbv-btn" title="Re-scan current view">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2" stroke="currentColor"
                stroke-width="1.6" stroke-linecap="round"/>
          <path d="M12.5 2v3h-3" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- Fit -->
      <button id="btn-fit" class="cbv-btn" title="Fit tree to view">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <path d="M2 6V2h4M10 2h4v4M14 10v4h-4M6 14H2v-4"
                stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="5.5" y="5.5" width="5" height="5" rx="1"
                stroke="currentColor" stroke-width="1.4" opacity=".5"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Progress ───────────────────────────────────────────── -->
  <div id="cbv-progress-wrap" hidden>
    <div id="cbv-progress-bar"></div>
  </div>

  <!-- ── Status ─────────────────────────────────────────────── -->
  <div id="cbv-status">
    <span class="cbv-status-dot" id="cbv-dot"></span>
    <span id="cbv-status-text">Waiting for page…</span>
  </div>

  <!-- ── Canvas ─────────────────────────────────────────────── -->
  <div id="cbv-tree">
    <canvas id="cbv-minimap" width="120" height="80"></canvas>
    <div class="cbv-empty" id="cbv-empty">
      <svg class="cbv-empty-icon" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="7"  r="4" stroke="currentColor" stroke-width="2"/>
        <circle cx="8"  cy="33" r="4" stroke="currentColor" stroke-width="2"/>
        <circle cx="32" cy="33" r="4" stroke="currentColor" stroke-width="2"/>
        <path d="M20 11v8M20 19Q20 27 8 27M20 19Q20 27 32 27"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p class="cbv-empty-title">No conversation tree yet</p>
      <p class="cbv-empty-sub">Open a ChatGPT or Claude chat,<br>then click <strong>Build</strong>.</p>
    </div>
  </div>

</div>
<script src="sidepanel.js"></script>
</body>
</html>
